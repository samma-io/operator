apiVersion: batch/v1
kind: Job
metadata:
  name: {{ NAME }}
spec:
  template:
    spec:
      containers:
      - name: http-headers-scanner
        image: ghcr.io/samma-io/detect-http-headers-scanner:latest
        env:
          - name: TARGET
            value: {{ TARGET }}
          - name: SAMMA_IO_SCANNER
            value: http-headers-scanner
        {% for user in ENV %}
          - name: {{ user }}
            value: "{{ ENV[user] }}"
        {% endfor %}
      restartPolicy: Never
