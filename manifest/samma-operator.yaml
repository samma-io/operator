apiVersion: v1
kind: Namespace
metadata:
  name: samma-io
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: scanner.samma.io
spec:
  scope: Namespaced
  group: samma.io
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                target:
                  type: string
                ip:
                  type: string
                scheduler:
                  type: string
                scanners:
                  type: array
                  items:
                    type: string
                samma_io_json:
                  type: string
                samma_io_id:
                  type: string
                samma_io_tags:
                  type: array
                  items:
                    type: string
                write_to_file:
                  type: string
                elasticsearch:
                  type: string
                templates:
                  type: array
                  items:
                    type: string
                profile:
                  type: string
  names:
    kind: Scanner
    plural: scanner
    singular: scanner
    shortNames:
      - sc
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: samma-operator
  namespace: samma-io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: samma-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: samma-operator
    namespace: samma-io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samma-operator
  namespace: samma-io
spec:
  selector:
    matchLabels:
      app: samma-operator
  template:
    metadata:
      labels:
        app: samma-operator
    spec:
      serviceAccountName: samma-operator
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: samma-operator
          image: mattiashem/samma-operator:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SAMMA_IO_ID
              value: ""
            - name: SAMMA_IO_TAGS
              value: "['scanner']"
            - name: SAMMA_IO_JSON
              value: "{}"
            - name: WRITE_TO_FILE
              value: "true"
            - name: SAMMA_IO_API_URL
              value: "https://www.samma.io"
            - name: SAMMA_IO_API_TOKEN
              value: ""
            - name: SAMMA_IO_PROFILE_ID
              value: ""
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: NATS_ENABLED
              value: "True"
            - name: NATS_SUBJECT
              value: "samma-io.scan"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 100m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: operator
  namespace: samma-io
spec:
  selector:
    app: samma-operator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samma-api
  namespace: samma-io
spec:
  selector:
    matchLabels:
      app: samma-api
  template:
    metadata:
      labels:
        app: samma-api
    spec:
      serviceAccountName: samma-operator
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: samma-api
          image: sammascanner/api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SAMMA_IO_ID
              value: ""
            - name: SAMMA_IO_TAGS
              value: "['scanner']"
            - name: SAMMA_IO_JSON
              value: "{}"
            - name: WRITE_TO_FILE
              value: "true"
            - name: SAMMA_IO_API_URL
              value: "https://www.samma.io"
            - name: SAMMA_IO_API_TOKEN
              value: ""
            - name: SAMMA_IO_PROFILE_ID
              value: ""
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: samma-io
spec:
  selector:
    app: samma-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: samma-io
spec:
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: nats
          image: nats:2
          ports:
            - containerPort: 4222
            - containerPort: 8222
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: samma-io
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timescaledb-pvc
  namespace: samma-io
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: samma-io
spec:
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: timescaledb
          image: timescale/timescaledb:latest-pg15
          env:
            - name: POSTGRES_DB
              value: samma
            - name: POSTGRES_USER
              value: samma
            - name: POSTGRES_PASSWORD
              value: samma
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: timescaledb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: samma-io
spec:
  selector:
    app: timescaledb
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: samma-bridge
  namespace: samma-io
spec:
  selector:
    matchLabels:
      app: samma-bridge
  template:
    metadata:
      labels:
        app: samma-bridge
    spec:
      serviceAccountName: samma-operator
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: samma-bridge
          image: sammascanner/bridge:latest
          imagePullPolicy: Always
          env:
            - name: NATS_URL
              value: nats://nats:4222
            - name: NATS_SUBJECT
              value: samma-io.scan
            - name: DATABASE_URL
              value: postgresql://samma:samma@timescaledb:5432/samma
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
